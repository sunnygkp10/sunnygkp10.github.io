<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watermark</title>
<style>
  /* YouTube watermark: 150 × 150 px, transparent background.
   * Avatar inside cyan→purple gradient ring. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 150px; height: 150px;
    background: transparent;
    overflow: hidden;
  }

  .watermark {
    position: absolute;
    inset: 0;
    width: 150px;
    height: 150px;
    display: grid;
    place-items: center;
  }

  /* Outer gradient ring */
  .ring {
    position: relative;
    width: 138px;
    height: 138px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00E5FF 0%, #A855F7 100%);
    padding: 4px;
    filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.55))
            drop-shadow(0 0 16px rgba(168, 85, 247, 0.35));
  }

  /* Avatar */
  .avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background-image: url('sunny.jpg');
    background-size: cover;
    background-position: center;
    border: 2px solid rgba(10, 10, 14, 1);
  }
</style>
</head>
<body>
  <div class="watermark">
    <div class="ring">
      <div class="avatar"></div>
    </div>
  </div>
</body>
</html>

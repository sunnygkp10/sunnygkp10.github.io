ion:absolute;left:0;color:var(--neon-cyan)}.msg.ai .bubble a{color:var(--neon-cyan);text-decoration:none;border-bottom:1px dotted rgba(0,229,255,.4)}.msg.ai .bubble a:hover{border-bottom-color:var(--neon-cyan)}.typing{display:inline-flex;gap:4px;padding:.2rem 0}.typing span{width:6px;height:6px;background:var(--neon-cyan);border-radius:50%;opacity:.4;animation:typingBounce 1.2s ease-in-out infinite both}.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}@keyframes typingBounce{0%,100%,80%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}.cursor{display:inline-block;width:8px;height:1em;background:var(--neon-cyan);margin-left:1px;vertical-align:text-bottom;animation:cursorBlink .9s steps(2,start) infinite;box-shadow:0 0 8px var(--neon-cyan-glow)}@keyframes cursorBlink{to{opacity:0}}.chips{display:flex;flex-wrap:wrap;gap:.6rem;padding:.5rem 0 .25rem 3rem;animation:fadeUp .4s ease-out .1s both}.chip{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.25);border-radius:999px;padding:.55rem 1rem;color:var(--text);font-family:var(--font-body);font-size:.92rem;font-weight:500;cursor:pointer;transition:all .18s ease}.chip:hover{background:rgba(0,229,255,.12);border-color:var(--neon-cyan);color:var(--neon-cyan);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,229,255,.16)}.chip.primary{background:rgba(168,85,247,.08);border-color:rgba(168,85,247,.3)}.chip.primary:hover{border-color:var(--neon-purple);color:var(--neon-purple);box-shadow:0 4px 14px rgba(168,85,247,.18)}.chips.stale{opacity:.55}.chips.stale:hover{opacity:1}.link-row{display:flex;flex-wrap:wrap;gap:.55rem;margin-top:.65rem}.link-row a.linkbtn{display:inline-flex;align-items:center;gap:.4rem;background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.25);border-radius:8px;padding:.45rem .85rem;color:var(--text);text-decoration:none;font-size:.88rem;font-weight:500;transition:all .18s ease;border-bottom:1px solid rgba(0,22  4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> About the course</button> <button class="nav-item" data-key="building"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg> What I'm building</button> <button class="nav-item" data-key="work"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg> Work history</button> <button class="nav-item" data-key="stack"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> Tech stack</button> <button class="nav-item" data-key="college"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg> Education</button></div><div class="nav-group"><div class="nav-label">Connect</div><button class="nav-item" data-key="contact"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Get in touch</button> <button class="nav-item" data-key="resume"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> Resume (PDF)</button> <button class="nav-item" data-key="collab"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/></svg> Collaborate</button></div><div class="socials"><a href="https://linkedin.com/in/sunnygkp10" target="_blank" rel="noopener" aria-label="LinkedIn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.95v5.66H9.35V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.36-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.11 2.06 2.06 0 0 1 0 4.11zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z"/></svg> </a><a href="https://youtube.com/@Sunnygkp10" target="_blank" rel="noopener" aria-label="YouTube"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.6 3.6 12 3.6 12 3.6s-7.6 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.8.5 9.4.5 9.4.5s7.6 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg> </a><a href="https://github.com/sunnygkp10" target="_blank" rel="noopener" aria-label="GitHub"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.4-4-1.4-.6-1.4-1.4-1.8-1.4-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.9 1.2 1.9 1.2 1.1 1.9 2.9 1.4 3.6 1 .1-.8.4-1.4.8-1.7-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/></svg> </a><a href="mailto:sunnygkp10@gmail.com" aria-label="Email"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6zm-2 0l-8 5-8-5h16zm0 12H4V8l8 5 8-5v10z"/></svg></a></div><div class="built-tag">Built solo · <span class="accent">2026</span></div></aside><div class="scrim" id="scrim"></div><main class="chat-area"><div id="thread" class="thread"></div></main></div><script>const TREE={greeting:{body:"<p>Hi — I'm Sunny.</p>\n<p>I build distributed systems at Amazon, and I'm teaching engineers how to architect agentic ones through a YouTube course called <strong>Agentic System Design</strong>.</p>\n<p>What do you want to know? Pick one below or use the side menu anytime.</p>",chips:["course","building","work","stack","contact","resume"],instant:!0},course:{label:"Tell me about the course",body:'<p><strong>Agentic System Design</strong> is a structured course for engineers who want to build real production-grade AI agents — not another "what is an agent" explainer.</p>\n<p>The thesis: stop treating the LLM as a black box. Treat it as one unreliable component in a distributed system, and engineer the system around it.</p>\n<p>Two parts. <strong>Part 1</strong> (6 episodes) covers the concepts — how LLMs became agents, what they actually do well, and what breaks. <strong>Part 2</strong> (32 episodes) builds a real agentic system on AWS end-to-end: tool design, evals, observability, security, multi-agent orchestration, the whole thing.</p>\n<p>6 episodes produced so far. The channel launches soon.</p>',chips:["why-now","syllabus","subscribe","sample","back"]},"why-now":{label:"Why this course, why now?",body:"<p>Most AI courses stop where the real work begins. They explain what an LLM is, show a Hello World agent, and call it a day.</p>\n<p>Production is a different beast. <em>85% accuracy per action</em> means 20% success on a 10-step workflow. Tools hallucinate. Evals are a research project unto themselves. Cost compounds in ways that don't show up until prod.</p>\n<p>The course covers the parts most content skips — failure modes, evals authored <em>before</em> dev, cost forecasting, observability, governance, multi-agent coordination, legacy integration. The gap isn't model capability. It's operational engineering discipline. That's what I'm teaching.</p>",chips:["back"]},syllabus:{label:"What's the syllabus?",body:"<p>38 episodes across 13 chapters, in two parts.</p>\n<p><strong>Part 1 — How LLMs became agents</strong> (6 episodes, ~100 min)<br>\nA story-driven walk from Eliza to ChatGPT to today. Episodes on the LLM as engineering primitive, prompting for reasoning, retrieval-augmented generation, tools and function calling, and the ReAct loop.</p>\n<p><strong>Part 2 — Engineering real agentic systems</strong> (32 episodes, ~8.5 hours)<br>\nBuild the AI Digest system end-to-end on AWS. Tool design, resilience, memory, evals, observability, security, human-in-the-loop, orchestration, multi-agent, streaming, deployment, case studies.</p>",chips:["back"]},subscribe:{label:"Where do I subscribe?",body:'<p>Channel is at <a href="https://youtube.com/@Sunnygkp10" target="_blank" rel="noopener">youtube.com/@Sunnygkp10</a>. First episode drops soon — subscribe so you don\'t miss it. I\'ll also announce it on LinkedIn.</p>\n<div class="link-row">\n  <a class="linkbtn" href="https://youtube.com/@Sunnygkp10" target="_blank" rel="noopener">▶ YouTube</a>\n  <a class="linkbtn" href="https://linkedin.com/in/sunnygkp10" target="_blank" rel="noopener">in LinkedIn</a>\n</div>',chips:["back"]},sample:{label:"Show me a sample episode",body:'<p>First episode drops at launch. Subscribe to the channel and you\'ll see it the moment it\'s live.</p>\n<div class="link-row">\n  <a class="linkbtn" href="https://youtube.com/@Sunnygkp10" target="_blank" rel="noopener">▶ Subscribe on YouTube</a>\n</div>',chips:["back"]},building:{label:"What are you building right now?",body:"<p>Two things in parallel.</p>\n<p><strong>A custom course-production system.</strong> I'm doing video production <em>by code</em> — every episode (slides, animations, recording, post-production) is generated and orchestrated through software rather than by hand. The goal: turn what's normally a multi-day record-edit-publish cycle into something close to a one-command operation. It's the reason I can ship episodes solo without a video team.</p>\n<p><strong>AI Digest</strong> — the anchor project that gets built across Part 2. A real agentic system on AWS that crawls technical content, ranks it, runs a human-approval loop, and publishes a daily digest. Bedrock Claude for reasoning, Step Functions for orchestration, Lambda for the agents, CDK for infrastructure. Plus a live chat widget grounded in the digest's own memory.</p>\n<p>The plan is to ship the system to production <em>while</em> teaching how it's architected. Built in the open. Research-backed. Reasoning-first.</p>",chips:["ai-digest","follow","collab","back"]},"ai-digest":{label:"What's the AI Digest?",body:"<p>A daily agentic digest of agentic-AI research, papers, blog posts, and product launches.</p>\n<p><strong>Architecture:</strong> EventBridge cron triggers a Step Functions workflow. Parallel crawlers (RSS, HN, Reddit, arXiv) pull the day's content. A dedup pass uses embeddings stored in DynamoDB. Bedrock Claude summarizes and ranks. A human-in-the-loop step pauses the pipeline for admin approval via Telegram (task token pattern). Approved articles publish.</p>\n<p>Plus a live-chat widget — visitors can ask questions about anything in the digest, with answers grounded in the day's articles via RAG.</p>\n<p>The companion repo goes public when Part 2 episodes start dropping.</p>",chips:["back"]},follow:{label:"Where can I follow along?",body:'<p>Three places:</p>\n<ul>\n<li><strong>YouTube</strong> — <a href="https://youtube.com/@Sunnygkp10" target="_blank" rel="noopener">youtube.com/@Sunnygkp10</a> (where every episode drops)</li>\n<li><strong>LinkedIn</strong> — weekly threads tied to each episode</li>\n<li><strong>GitHub</strong> — <a href="https://github.com/sunnygkp10" target="_blank" rel="noopener">github.com/sunnygkp10</a> for the course companion code (publishing as Part 2 episodes go live)</li>\n</ul>',chips:["back"]},collab:{label:"Want to collaborate?",body:'<p>Always interested in talking with people building in this space — agentic system architects, AI platform engineers, evaluators, security researchers.</p>\n<p>Best route: LinkedIn DM. I read everything that lands there.</p>\n<div class="link-row">\n  <a class="linkbtn" href="https://linkedin.com/in/sunnygkp10" target="_blank" rel="noopener">in LinkedIn</a>\n</div>',chips:["back"]},work:{label:"Walk me through your work",body:'<p>9 years in. Latest first:</p>\n<p><strong>Amazon SDE II</strong> (2021 — present) — Currently on <strong>Nautilus</strong> in Edinburgh, building software for 1.5 million Amazonians. Before this, AWS Finance Technology where I led a headcount-management product <em>and</em> designed a micro-frontend framework adopted org-wide for independent UI delivery. Multiple "Exceeds" performance ratings since the 2021 promo. Bar Raiser certified. 200+ interviews conducted.</p>\n<p><strong>Amazon SDE I</strong> (2020 — 2021) — Worldwide Capacity Planning. Data pipelines and microservices for headcount tooling used across Amazon. Lambda, Kinesis, DynamoDB, ElasticSearch, Redshift.</p>\n<p><strong>Amazon DevOps Engineer</strong> (2017 — 2019) — Customer Engagement Tech in Hyderabad. Infrastructure, deployments, on-call. Won Star Performer Q4 2019 for an infra-cost project that saved <em>~$150K/month</em>.</p>\n<p><strong>Drishticone</strong> (2014 — 2017) — Web team lead at the KNIT campus newsletter while finishing my BTech. Scaled the team from 3 to 8 engineers and used the freed capacity to take on every web-development project on campus.</p>',chips:["amazon-now","mfe","bar-raiser","pre-amazon","college","back"]},"amazon-now":{label:"What are you working on at Amazon now?",body:"<p>I'm on the <strong>Nautilus</strong> team in Edinburgh. We build software used by Amazon's 1.5 million employees globally.</p>\n<p>The work is under NDA — I can't go further on specifics. What I can say: Nautilus sits at the intersection of ML, large-scale data, microservices, and end-user UX. It's the cross-section agentic systems live in, which is part of why I'm deep in this material right now.</p>",chips:["back"]},mfe:{label:"Tell me about the MFE framework",body:"<p>At AWS Finance Tech, all teams across the org shared one frontend pipeline. It worked at first, then it didn't.</p>\n<p>By Q4 of one year the platform was running ~100 deployments/month with <strong>~60-minute build times</strong>. A single team's bad commit could block all the others from shipping. Pre-prod regressions were common; rollbacks and reverts were a quarterly tax.</p>\n<p>I designed and shipped a <strong>Micro-Frontend framework</strong> that decoupled the model. Each team got its own pipeline and its own version set. Build times dropped <em>~75%</em> (target &lt;15 minutes). Cross-team blocking went away — one team's regression could no longer halt the others.</p>\n<p>I also moved ownership granularity from package-level to <strong>widget-level</strong>, so different verticals could own different parts of the same page without fighting over file boundaries. Shared-dependency upgrades became incremental rather than all-or-nothing — a team could adopt a new UI library version on its own timeline.</p>\n<p>Built per-team adoption metrics into the framework so leadership could see what was actually being used, not just what was theoretically available.</p>\n<p>Adopted org-wide.</p>",chips:["back"]},"bar-raiser":{label:"What's a Bar Raiser?",body:"<p>Amazon's interview calibration program. The Bar Raiser is a senior engineer added to your interview loop from outside the hiring team — their job is to make sure the candidate raises the bar of the team they're joining, not just clears it. Has veto power on the hiring decision.</p>\n<p>I got certified in 2023 and have run <strong>200+ interviews</strong> to date. Side benefit: it's the best forcing function I've found for studying what actually makes engineers effective at scale.</p>",chips:["back"]},"pre-amazon":{label:"Pre-Amazon, what did you do?",body:"<p>BTech in Information Technology at Kamla Nehru Institute of Technology, Sultanpur (2013–2017). Class 12 at Jawahar Navodaya Vidyalaya, Kushinagar before that.</p>\n<p>During college I led the web team at <em>Drishticone</em>, the campus newsletter. Started as a 3-person team; <strong>grew it to 8 engineers</strong> by automating the routine newsletter workflow so it could be maintained by just 2 of them. With the freed capacity we took on <strong>every college-level web project</strong> — international conference websites, the technical fest site, college competition platforms.</p>\n<p>Also ran <strong>multiple workshops on web development</strong> for juniors — both to teach and to build the team's pipeline.</p>\n<p>Summer 2016 was a six-week stint at IIT Kanpur's CSE department on virtualization and networks. Built the Mozilla Investigator agent endpoints in Go, an image-based product recommendation system in Python + OpenCV, and the usual hackathon work.</p>",chips:["college","back"]},college:{label:"What did you study in college?",body:"<p><strong>Bachelor of Technology — Information Technology</strong><br>\nKamla Nehru Institute of Technology, Sultanpur · 2013–2017 · 78.26%</p>\n<p>Got in via UPSEE 2013 (rank 4443). KNIT is a state-government engineering college in Uttar Pradesh affiliated to Dr. APJ Abdul Kalam Technical University. Maintained consistent academic performance across all 8 semesters — high of 82.3% (sem 5) and low of 76.1% (sem 4).</p>\n<p><strong>Coursework that mapped most to where I ended up:</strong></p>\n<ul>\n<li><em>Distributed Systems</em>, <em>Distributed Database</em>, <em>Computer Networks</em>, <em>Cryptography &amp; Network Security</em></li>\n<li><em>Data Structures</em>, <em>Design &amp; Analysis of Algorithms</em>, <em>Operating Systems</em>, <em>Compilers (TAFL)</em></li>\n<li><em>DBMS</em>, <em>Data Mining &amp; Data Warehousing</em>, <em>Software Engineering</em>, <em>Object Oriented Systems</em></li>\n<li><em>Artificial Intelligence</em>, <em>Digital Image Processing</em>, <em>Web Technology</em>, <em>Mobile Computing</em></li>\n</ul>\n<p><strong>Before that</strong> — 7 years at <strong>Jawahar Navodaya Vidyalaya, Kushinagar</strong> (2005 — 2012). JNVs are India's residential merit-entrance schools, run by the central government. I cleared the JNVST entrance in 2005 (Class 6) and stayed all the way through Class 12. Science stream, CBSE. 83.16% in the boards. The seven most formative years of my life.</p>",chips:["back"]},stack:{label:"What's your tech stack?",body:"<p>Daily, in 2026:</p>\n<ul>\n<li><strong>TypeScript</strong> everywhere</li>\n<li><strong>AWS</strong> — Lambda, Step Functions, Bedrock, DynamoDB, API Gateway, EventBridge, CDK</li>\n<li><strong>React</strong> + <strong>Node.js</strong> for surfaces</li>\n<li><strong>LLMs</strong> — Bedrock Claude, MCP, multi-agent orchestration, RAG, evals</li>\n</ul>\n<p>Past depth I still draw on: Java, Go, Python, OpenCV, distributed-systems fundamentals.</p>\n<p>AWS Certified Developer Associate + Solutions Architect Associate.</p>",chips:["aws","llms","distsys","back"]},aws:{label:"AWS depth?",body:"<p>9 years on AWS across three Amazon orgs.</p>\n<p><strong>Worldwide Capacity Planning</strong> — data pipelines through Lambda + Kinesis + Redshift, DynamoDB + ElasticSearch for hot reads.</p>\n<p><strong>AWS Finance Tech</strong> — led the headcount management platform on Lambda + Fargate + DynamoDB + S3, X-Ray for tracing, Step Functions for approval workflows. Also designed and shipped the micro-frontend framework adopted across all 6 teams in the org.</p>\n<p><strong>Nautilus</strong> — current. Same toolset, NDA-bounded on specifics.</p>\n<p>Two AWS Associate certs (Developer + Solutions Architect).</p>",chips:["back"]},llms:{label:"LLMs and AI Agents?",body:"<p>Building with them daily for the AI Digest project. Bedrock Claude for reasoning, Anthropic's Claude API for prototyping, MCP as the tool-protocol layer, multi-agent orchestration via Step Functions, RAG via DynamoDB + Lambda brute-force cosine for the demo (pgvector as the upgrade path).</p>\n<p>Evals are where I think most teams under-invest. The course spends 4 episodes on this — eval-as-spec, sub-evals per step, LLM-as-judge vs. human review, production feedback loops.</p>",chips:["back"]},distsys:{label:"Distributed systems?",body:"<p>8 years of microservices in production. Event-driven architectures, idempotent tools, retry semantics, circuit breakers, graceful degradation, cost-bounded execution.</p>\n<p>Multi-agent systems are where distributed-systems instincts get really useful — they're agents-as-microservices, and the same patterns (saga, consensus, anti-corruption layer) carry over directly.</p>",chips:["back"]},contact:{label:"How do I get in touch?",body:'<p>Four ways. <strong>LinkedIn DM</strong> is the best route — I read everything that lands there.</p>\n<div class="link-row">\n  <a class="linkbtn" href="https://linkedin.com/in/sunnygkp10" target="_blank" rel="noopener">in LinkedIn</a>\n  <a class="linkbtn" href="mailto:sunnygkp10@gmail.com">✉ Email</a>\n  <a class="linkbtn" href="https://youtube.com/@Sunnygkp10" target="_blank" rel="noopener">▶ YouTube</a>\n  <a class="linkbtn" href="https://github.com/sunnygkp10" target="_blank" rel="noopener">⌘ GitHub</a>\n</div>\n<p style="margin-top: 0.85rem;">Happy to chat with anyone building in this space — DMs are open.</p>',chips:["back"]},resume:{label:"Download resume (PDF)",body:'<p>Resume is downloading…</p>\n<p>If it didn\'t start, <a href="assets/resume.pdf" target="_blank" rel="noopener" download>tap here</a>.</p>',chips:["back"],onEnter:()=>{const e=document.createElement("a");e.href="assets/resume.pdf",e.download="sunny-tiwari-resume.pdf",document.body.appendChild(e),e.click(),document.body.removeChild(e)}}},CHIP_LABELS={back:"↺ Back to start",course:"Tell me about the course",building:"W

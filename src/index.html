<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunny Tiwari — Software Engineer · Agentic System Design</title>
<meta name="description" content="Software engineer at Amazon. Teaching agentic system design on YouTube — a structured course on engineering production-grade AI agents.">
<meta name="author" content="Sunny Tiwari">

<!-- Open Graph -->
<meta property="og:title" content="Sunny Tiwari — Software Engineer · Agentic System Design">
<meta property="og:description" content="Software engineer at Amazon. Teaching agentic system design on YouTube — a structured course on engineering production-grade AI agents.">
<meta property="og:url" content="https://sunnytiwari.com">
<meta property="og:type" content="profile">
<meta property="og:image" content="https://sunnygkp10.github.io/assets/sunny.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-deep:        #0A0A0E;
    --bg-surface:     #14141B;
    --bg-elevated:    #1B1B23;
    --bg-glass:       rgba(20, 20, 27, 0.7);
    --bg-sidebar:     #0E0E14;
    --border:         rgba(255, 255, 255, 0.08);
    --border-strong:  rgba(255, 255, 255, 0.14);

    --text:           #F5F7FA;
    --text-soft:      #C2C8D2;
    --text-muted:     #6B7280;
    --text-faint:     #4A5160;

    --neon-cyan:      #00E5FF;
    --neon-cyan-dim:  rgba(0, 229, 255, 0.18);
    --neon-cyan-glow: rgba(0, 229, 255, 0.35);
    --neon-purple:    #A855F7;
    --neon-purple-dim:rgba(168, 85, 247, 0.18);
    --neon-green:     #39FF14;
    --neon-green-dim: rgba(57, 255, 20, 0.18);
    --neon-amber:     #FFB800;
    --neon-pink:      #FF2D78;

    --font-body:      'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono:      'Fira Code', 'SF Mono', Menlo, monospace;

    --sidebar-w: 260px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    height: 100vh;            /* lock to viewport */
    overflow: hidden;         /* no browser-level scroll */
  }
  body {
    display: flex;
    flex-direction: column;
  }

  /* Custom scrollbar for any internal scrollers (sidebar + chat) */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.06);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0, 229, 255, 0.25); }

  /* ─── Particle background ──────────────────────────────── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.55;
  }

  /* ─── Top brand bar (fixed at top of flex column) ──────── */
  .topbrand {
    flex-shrink: 0;
    z-index: 30;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: rgba(10, 10, 14, 0.7);
    border-bottom: 1px solid var(--border);
  }
  .topbrand-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.85rem 1.5rem;
    max-width: 1280px;
    margin: 0 auto;
  }
  .topbrand .logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    text-decoration: none;
    color: inherit;
  }
  .topbrand .logo-mark {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-purple) 100%);
    display: grid;
    place-items: center;
    font-family: var(--font-body);
    font-weight: 800;
    font-size: 0.85rem;
    color: #0A0A0E;
    box-shadow: 0 0 18px rgba(0, 229, 255, 0.25);
  }
  .topbrand .logo-text {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-soft);
    letter-spacing: 0.05em;
  }
  .topbrand .logo-text .accent { color: var(--neon-cyan); font-weight: 600; }

  .topbrand .topnav {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .topbrand .restart-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.4rem 0.85rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .topbrand .restart-btn:hover {
    color: var(--neon-cyan);
    border-color: var(--neon-cyan-dim);
  }
  .topbrand .restart-btn.hidden { display: none; }

  .menu-toggle {
    display: none;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.4rem 0.55rem;
    color: var(--text-muted);
    cursor: pointer;
  }

  /* ─── App layout ───────────────────────────────────────── */
  .app {
    position: relative;
    z-index: 1;
    flex: 1;                    /* fills the rest of the viewport */
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 0;              /* lets children shrink properly inside flex */
    overflow: hidden;
  }

  /* ─── Sidebar ──────────────────────────────────────────── */
  aside.sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    padding: 1.5rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 1.6rem;
    height: 100%;
    overflow-y: auto;
  }

  aside .profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0.55rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--border);
  }
  aside .profile .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background-image: url('assets/sunny.jpg');
    background-size: cover;
    background-position: center;
    border: 2px solid var(--neon-cyan);
    box-shadow: 0 0 24px var(--neon-cyan-dim);
    margin-bottom: 0.25rem;
  }
  aside .profile .name {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  aside .profile .tagline {
    font-family: var(--font-mono);
    font-size: 0.66rem;
    color: var(--neon-cyan);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  aside .profile .location {
    font-family: var(--font-mono);
    font-size: 0.66rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  aside .nav-group { display: flex; flex-direction: column; gap: 0.2rem; }
  aside .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    font-weight: 600;
    color: var(--text-faint);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
    padding-left: 0.55rem;
  }
  aside .nav-item {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.55rem 0.7rem;
    color: var(--text-soft);
    text-decoration: none;
    border-radius: 8px;
    font-size: 0.92rem;
    font-weight: 500;
    background: transparent;
    border: 1px solid transparent;
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: all 0.16s ease;
    font-family: inherit;
  }
  aside .nav-item .ico {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    opacity: 0.7;
  }
  aside .nav-item:hover {
    background: rgba(0, 229, 255, 0.06);
    border-color: rgba(0, 229, 255, 0.18);
    color: var(--text);
  }
  aside .nav-item:hover .ico { opacity: 1; color: var(--neon-cyan); }
  aside .nav-item-feature {
    background: linear-gradient(135deg, rgba(0,229,255,0.10) 0%, rgba(168,85,247,0.10) 100%);
    border-color: rgba(0, 229, 255, 0.32);
    color: var(--text);
    font-weight: 600;
    text-decoration: none;
  }
  aside .nav-item-feature .ico { opacity: 1; color: var(--neon-cyan); }
  aside .nav-item-feature:hover {
    background: linear-gradient(135deg, rgba(0,229,255,0.18) 0%, rgba(168,85,247,0.18) 100%);
    border-color: var(--neon-cyan);
    box-shadow: 0 4px 14px rgba(0, 229, 255, 0.18);
  }

  aside .socials {
    display: flex;
    gap: 0.4rem;
    padding-left: 0.55rem;
  }
  aside .socials a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-muted);
    transition: all 0.16s ease;
  }
  aside .socials a:hover {
    color: var(--neon-cyan);
    border-color: var(--neon-cyan-dim);
    transform: translateY(-1px);
  }
  aside .socials a svg { width: 14px; height: 14px; }

  aside .built-tag {
    font-family: var(--font-mono);
    font-size: 0.64rem;
    color: var(--text-faint);
    letter-spacing: 0.05em;
    text-align: center;
    margin-top: auto;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
  }
  aside .built-tag .accent { color: var(--neon-cyan); }

  /* ─── Main / chat area ─────────────────────────────────── */
  main.chat-area {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
    padding: 2rem 1.5rem 3rem;
  }
  .thread {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .msg { display: flex; gap: 0.75rem; animation: fadeUp 0.4s ease-out both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── User-side message ──────────────── */
  .msg.user {
    justify-content: flex-end;
  }
  .msg.user .bubble {
    max-width: 85%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 16px 16px 4px 16px;
    padding: 0.7rem 1rem;
    color: var(--text-soft);
    font-size: 0.95rem;
    line-height: 1.4;
  }

  /* ─── AI-side message ──────────────── */
  .msg.ai .ai-avatar {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 12px;
    background-image: url('assets/sunny.jpg');
    background-size: cover;
    background-position: center;
    border: 1px solid rgba(0, 229, 255, 0.3);
    margin-top: 0.15rem;
  }
  .msg.ai .bubble {
    max-width: 88%;
    background: var(--bg-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-strong);
    border-radius: 4px 16px 16px 16px;
    padding: 0.95rem 1.15rem;
    color: var(--text);
    font-size: 1rem;
    line-height: 1.55;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 8px 32px rgba(0,0,0,0.18);
  }
  .msg.ai .bubble strong { color: var(--neon-cyan); font-weight: 600; }
  .msg.ai .bubble em     { color: var(--neon-green); font-style: normal; font-weight: 500; }
  .msg.ai .bubble p      { margin-bottom: 0.6rem; }
  .msg.ai .bubble p:last-child { margin-bottom: 0; }
  .msg.ai .bubble ul     { padding-left: 0; list-style: none; margin: 0.4rem 0; }
  .msg.ai .bubble ul li  {
    padding-left: 1rem;
    position: relative;
    margin-bottom: 0.3rem;
    color: var(--text-soft);
  }
  .msg.ai .bubble ul li::before {
    content: "›";
    position: absolute;
    left: 0;
    color: var(--neon-cyan);
  }
  .msg.ai .bubble a {
    color: var(--neon-cyan);
    text-decoration: none;
    border-bottom: 1px dotted rgba(0, 229, 255, 0.4);
  }
  .msg.ai .bubble a:hover { border-bottom-color: var(--neon-cyan); }

  /* ─── Typing indicator ──────────────── */
  .typing {
    display: inline-flex;
    gap: 4px;
    padding: 0.2rem 0;
  }
  .typing span {
    width: 6px;
    height: 6px;
    background: var(--neon-cyan);
    border-radius: 50%;
    opacity: 0.4;
    animation: typingBounce 1.2s ease-in-out infinite both;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%           { transform: translateY(-4px); opacity: 1; }
  }

  /* ─── Streaming cursor (TypeIn) ──────────────── */
  .cursor {
    display: inline-block;
    width: 8px;
    height: 1em;
    background: var(--neon-cyan);
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: cursorBlink 0.9s steps(2, start) infinite;
    box-shadow: 0 0 8px var(--neon-cyan-glow);
  }
  @keyframes cursorBlink { to { opacity: 0; } }

  /* ─── Chat suggestion chips ─────────────────────────────────── */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    padding: 0.5rem 0 0.25rem 3rem;
    animation: fadeUp 0.4s ease-out 0.1s both;
  }
  .chip {
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0, 229, 255, 0.25);
    border-radius: 999px;
    padding: 0.55rem 1rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.92rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .chip:hover {
    background: rgba(0, 229, 255, 0.12);
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(0, 229, 255, 0.16);
  }
  .chip.primary {
    background: rgba(168, 85, 247, 0.08);
    border-color: rgba(168, 85, 247, 0.3);
  }
  .chip.primary:hover {
    border-color: var(--neon-purple);
    color: var(--neon-purple);
    box-shadow: 0 4px 14px rgba(168, 85, 247, 0.18);
  }
  /* Old chip groups become subtly dimmed but stay clickable */
  .chips.stale { opacity: 0.55; }
  .chips.stale:hover { opacity: 1; }

  /* Link list inside bubbles */
  .link-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.55rem;
    margin-top: 0.65rem;
  }
  .link-row a.linkbtn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0, 229, 255, 0.25);
    border-radius: 8px;
    padding: 0.45rem 0.85rem;
    color: var(--text);
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 500;
    transition: all 0.18s ease;
    border-bottom: 1px solid rgba(0, 229, 255, 0.25);
  }
  .link-row a.linkbtn:hover {
    background: rgba(0, 229, 255, 0.12);
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
  }

  /* ─── Scrim (mobile sidebar overlay) ───────────────────── */
  /* Default: hidden on every screen size. Only the mobile @media
   * block below makes it visible. Without this default rule the
   * div would sit as a third grid cell on desktop and break layout. */
  .scrim { display: none; }

  /* ─── Mobile ───────────────────────────────────────────── */
  @media (max-width: 800px) {
    .menu-toggle { display: inline-flex; align-items: center; }
    .app { grid-template-columns: 1fr; }
    aside.sidebar {
      position: fixed;
      top: 60px;
      left: 0;
      height: calc(100vh - 60px);
      width: var(--sidebar-w);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 25;
      box-shadow: 4px 0 28px rgba(0, 0, 0, 0.4);
    }
    aside.sidebar.open { transform: translateX(0); }
    main.chat-area { padding: 1.25rem 1rem 7rem; }
    .topbrand-inner { padding: 0.7rem 1rem; }
    .topbrand .logo-text { font-size: 0.7rem; }
    .chips { padding-left: 0; }
    .scrim {
      display: block;
      position: fixed;
      inset: 60px 0 0 0;
      background: rgba(0,0,0,0.6);
      z-index: 24;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .scrim.show { opacity: 1; pointer-events: auto; }
  }

  @media (prefers-reduced-motion: reduce) {
    .msg, .chips { animation: none; }
    .typing span, .cursor { animation: none; }
  }
</style>
</head>

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;

// Scrolls the chat area itself (not the window) to the bottom.

  setTimeout(() => {
    if (!chatArea) return;

      top: chatArea.scrollHeight,

    });

/* Holds the cancel function for whatever AI response is currently
 * mid-flight (typing-dot wait OR character streaming). Calling it
 * fast-forwards the in-progress message to its final state and
 * resolves its promise immediately. */
let cancelInFlight = null;

function appendAi(htmlBody, instant = false) {
  // Cancel any AI message still typing — fills it in instantly so this
  // new one can start cleanly.
  if (cancelInFlight) {
    cancelInFlight();
    cancelInFlight = null;
  }

  return new Promise((resolve) => {
    const wrap = el('div', 'msg ai');
    const avatar = el('div', 'ai-avatar');
    const bubble = el('div', 'bubble');
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    thread.appendChild(wrap);

    if (instant) {
      bubble.innerHTML = htmlBody;
      scrollToBottom();
      resolve(bubble);
      return;
    }

    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    scrollToBottom();

    // Phase 1: typing indicator wait. Cancel here = stop showing dots,
    // leave the bubble empty (the AI never finished its thought).
    const waitId = setTimeout(() => {
      bubble.innerHTML = '';
      // Phase 2: streaming. typeIn returns a cancel fn that stops in place.
      const cancelTyping = typeIn(bubble, htmlBody, () => {
        cancelInFlight = null;
        resolve(bubble);
      });
      cancelInFlight = cancelTyping;
    }, 380);

    // Cancel handler covering the wait phase
    cancelInFlight = () => {
      clearTimeout(waitId);
      bubble.innerHTML = '';            // remove the typing indicator
      bubble.style.display = 'none';    // hide the empty bubble entirely
      avatar.style.display = 'none';
      resolve(bubble);
    };
  });
}

/* Returns a cancel function that, when called, fast-forwards the
 * remaining text into the placeholders and removes the cursor. */
function typeIn(target, html, onComplete) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;

  const queue = [];
  function walk(srcNode, dstNode) {
    srcNode.childNodes.forEach((node) => {
      if (node.nodeType === Node.TEXT_NODE) {
        const span = document.createElement('span');
        dstNode.appendChild(span);
        queue.push({ span, text: node.textContent });
      } else if (node.nodeType === Node.ELEMENT_NODE) {
        const clone = node.cloneNode(false);
        dstNode.appendChild(clone);
        walk(node, clone);
      }
    });
  }
  walk(tmp, target);

  const cursor = el('span', 'cursor');
  target.appendChild(cursor);

  let qi = 0, ci = 0;
  let cancelled = false;
  const speed = 14;

  function finish() {
    cursor.remove();
    onComplete && onComplete();
  }

  const tick = setInterval(() => {
    if (cancelled) return;
    if (qi >= queue.length) {
      clearInterval(tick);
      finish();
      return;
    }
    const item = queue[qi];
    if (ci < item.text.length) {
      item.span.textContent += item.text[ci];
      ci++;
      target.appendChild(cursor);
      if (ci % 25 === 0) scrollToBottom();
    } else {
      qi++;
      ci = 0;
    }
  }, speed);

  return function cancelAtPosition() {
    if (cancelled) return;
    cancelled = true;
    clearInterval(tick);
    // Stop where we are — leave the half-typed text visible, just remove
    // the cursor. The rest never gets typed (that's what the user asked
    // for: real chat vibe, not a snap-fill).
    finish();
  };
}

function appendChips(keys) {
  const wrap = el('div', 'chips');
  keys.forEach((key) => {
    const isPrimary = key === 'back';
    const btn = el('button', isPrimary ? 'chip primary' : 'chip', CHIP_LABELS[key] || key);
    btn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      // Mark all OTHER chip groups as stale (visual cue) but leave them clickable
      document.querySelectorAll('.chips').forEach((g) => {
        if (g !== wrap) g.classList.add('stale');
      });
      handleChipClick(key);
    });
    wrap.appendChild(btn);
  });
  thread.appendChild(wrap);
  scrollToBottom();
  return wrap;
}

/* Each click bumps this token. After awaiting appendAi, we check that
 * we're still the latest call — if a newer click happened during our
 * typing, our chips would otherwise show up between the new message
 * and its chips. So we just bail. */
let chipSession = 0;

async function handleChipClick(key) {
  const session = ++chipSession;

  if (key === 'back') {
    appendUser('↺ Back to start');
    await appendAi('<p>What else can I tell you about?</p>', false);
    if (session !== chipSession) return;
    appendChips(TOP_LEVEL);
    restartBtn.classList.remove('hidden');
    return;
  }

  const node = TREE[key];
  if (!node) return;

  appendUser(node.label);
  if (node.onEnter) node.onEnter();
  await appendAi(node.body, false);
  if (session !== chipSession) return;       // a newer click superseded us
  if (node.chips && node.chips.length) {
    appendChips(node.chips);
  }
  restartBtn.classList.remove('hidden');
}

/* Sidebar nav buttons — same handler as chips */
document.querySelectorAll('aside .nav-item[data-key]').forEach((btn) => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.key;
    // Mark all chip groups stale (since nav-driven nav also "uses" prior chips)
    document.querySelectorAll('.chips').forEach((g) => g.classList.add('stale'));
    handleChipClick(key);
    // Close mobile sidebar after click
    closeSidebar();
  });
});

restartBtn.addEventListener('click', () => {
  thread.innerHTML = '';
  restartBtn.classList.add('hidden');
  init();
});

/* Mobile sidebar toggle */
function openSidebar()  { sidebar.classList.add('open');  scrim.classList.add('show'); }
function closeSidebar() { sidebar.classList.remove('open'); scrim.classList.remove('show'); }
menuToggle?.addEventListener('click', () => {
  sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
});
scrim?.addEventListener('click', closeSidebar);

async function init() {
  const greet = TREE.greeting;
  await appendAi(greet.body, true);
  appendChips(greet.chips);
}

init();

/* =============================================================
 * Background particle layer
 * ============================================================= */
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles;
  const COLORS = ['rgba(0,229,255,', 'rgba(168,85,247,', 'rgba(57,255,20,'];
  const COUNT = 40;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  function makeParticles() {
    particles = Array.from({ length: COUNT }, () => ({
      x:  Math.random() * W,
      y:  Math.random() * H,
      r:  Math.random() * 1.4 + 0.4,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      col: COLORS[Math.floor(Math.random() * COLORS.length)],
      a:  Math.random() * 0.42 + 0.12
    }));
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach((p) => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0)   p.x = W;
      if (p.x > W)   p.x = 0;
      if (p.y < 0)   p.y = H;
      if (p.y > H)   p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.col + p.a + ')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  resize(); makeParticles(); draw();
  window.addEventListener('resize', () => { resize(); makeParticles(); });
})();
</script>
